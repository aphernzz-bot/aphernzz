  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: #F0F2F5;
      color: #1A2A25;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 56px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 40px rgba(0,0,0,0.08);
    }

    .icon-wrap {
      width: 72px; height: 72px;
      background: #FEF3E2;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
    }
    .icon-wrap svg {
      width: 32px; height: 32px;
      stroke: #C47C3A; fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }

    .badge {
      display: inline-block;
      background: #FEF3E2;
      color: #C47C3A;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #0A1628;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    p {
      font-size: 0.93rem;
      color: #677385;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .divider {
      height: 1px;
      background: #EEF1F5;
      margin-bottom: 28px;
    }

    .contact-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #9AA5B4;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #0A5C42;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 999px;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }
    .contact-link:hover {
      background: #073D2C;
      transform: translateY(-1px);
    }
    .contact-link svg {
      width: 16px; height: 16px; fill: white; flex-shrink: 0;
    }

    .footer-note {
      margin-top: 28px;
      font-size: 0.75rem;
      color: #B0BAC8;
    }
    .footer-note a {
      color: #0A5C42;
      text-decoration: none;
      font-weight: 500;
    }

    @media (max-width: 480px) {
      .card { padding: 40px 28px; }
      h1 { font-size: 1.35rem; }
    }
  </style>
